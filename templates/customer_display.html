<!DOCTYPE html>
<html lang="{{ current_lang() }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>mooon shop</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body { margin: 0; font-family: Arial, sans-serif; background: #f7f5ef; color: #18181b; position: fixed; inset: 0; }
    .page { height: 100dvh; max-height: 100dvh; display: grid; grid-template-rows: auto minmax(0, 1fr) auto; padding: 16px; gap: 12px; overflow: hidden; }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    h1 { margin: 0; font-size: clamp(24px, 3.4vw, 46px); letter-spacing: 0; text-transform: lowercase; }
    .status { color: #52525b; font-size: clamp(13px, 1.7vw, 20px); }
    .language-switch { display: flex; gap: 8px; flex-wrap: wrap; }
    .lang-link { padding: 8px 10px; border-radius: 8px; color: #27272a; background: #e7e5df; text-decoration: none; font-weight: 700; }
    .lang-link.active { background: #111111; color: #ffffff; }
    .content { min-height: 0; display: grid; grid-template-columns: minmax(230px, 0.36fr) minmax(0, 0.64fr); gap: 12px; }
    .brand-panel { min-height: 0; background: #ffffff; border: 1px solid #dedbd2; border-radius: 8px; display: grid; align-items: center; padding: 18px; overflow: hidden; }
    .brand-logo { width: 100%; max-width: 420px; max-height: 100%; object-fit: contain; justify-self: center; }
    .display { min-height: 0; background: #ffffff; border: 1px solid #dedbd2; border-radius: 8px; overflow: auto; -webkit-overflow-scrolling: touch; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: clamp(8px, 1.35vw, 18px); border-bottom: 1px solid #e4e1d8; text-align: left; }
    th { position: sticky; top: 0; z-index: 1; color: #52525b; font-size: clamp(13px, 1.6vw, 20px); background: #f0eee7; }
    td { font-size: clamp(16px, 2.2vw, 28px); }
    tr:last-child td { border-bottom: none; }
    .item-cell { display: grid; grid-template-columns: clamp(44px, 6vw, 76px) 1fr; gap: 12px; align-items: center; }
    .item-image { width: clamp(44px, 6vw, 76px); aspect-ratio: 1; border: 1px solid #e4e1d8; border-radius: 8px; object-fit: cover; background: #ffffff; }
    .item-name { font-weight: 800; }
    .qty, .price, .subtotal { text-align: right; white-space: nowrap; }
    .empty { height: 100%; min-height: 0; }
    .totalbar { display: flex; align-items: end; justify-content: space-between; gap: 16px; background: #ffffff; border: 1px solid #dedbd2; border-radius: 8px; padding: clamp(12px, 2vw, 24px); color: #111111; }
    .total-label { color: #52525b; font-size: clamp(24px, 3vw, 42px); font-weight: 900; }
    .total-value { color: #111111; font-size: clamp(38px, 6.5vw, 82px); font-weight: 900; line-height: 0.95; }
    .paid { color: #15803d; font-weight: 800; }
    .thank-you {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      background: rgba(247, 245, 239, 0.94);
      opacity: 0;
      pointer-events: none;
      transform: scale(0.98);
      transition: opacity 220ms ease, transform 220ms ease;
    }
    .thank-you.show {
      opacity: 1;
      transform: scale(1);
    }
    .thank-card {
      display: grid;
      justify-items: center;
      gap: 18px;
      background: #ffffff;
      border: 1px solid #dedbd2;
      border-radius: 8px;
      padding: clamp(28px, 5vw, 54px);
      min-width: min(620px, calc(100vw - 32px));
      box-shadow: 0 20px 70px rgba(17, 17, 17, 0.16);
    }
    .checkmark {
      width: clamp(76px, 12vw, 132px);
      height: clamp(76px, 12vw, 132px);
      border-radius: 999px;
      border: 8px solid #111111;
      position: relative;
    }
    .checkmark::after {
      content: "";
      position: absolute;
      left: 28%;
      top: 48%;
      width: 42%;
      height: 22%;
      border-left: 8px solid #111111;
      border-bottom: 8px solid #111111;
      transform: rotate(-45deg) scale(0);
      transform-origin: left bottom;
    }
    .thank-you.show .checkmark::after {
      animation: drawCheck 420ms ease 120ms forwards;
    }
    .thank-logo { width: clamp(130px, 18vw, 220px); max-height: 220px; object-fit: contain; }
    .thank-text { font-size: clamp(34px, 6vw, 82px); font-weight: 900; letter-spacing: 0; text-align: center; }
    @keyframes drawCheck {
      to { transform: rotate(-45deg) scale(1); }
    }
    @media (max-width: 720px) {
      .page { padding: 10px; gap: 8px; }
      .topbar { align-items: stretch; flex-direction: column; gap: 8px; }
      .content { grid-template-columns: 1fr; grid-template-rows: minmax(110px, 0.28fr) minmax(0, 0.72fr); }
      .brand-panel { grid-template-columns: auto 1fr; grid-template-rows: 1fr; gap: 12px; padding: 10px; }
      .brand-logo { width: auto; height: 100%; max-width: 120px; }
      th:nth-child(2), td:nth-child(2) { display: none; }
      .totalbar { align-items: center; flex-direction: row; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div>
        <h1>mooon shop</h1>
        <div id="displayStatus" class="status"></div>
      </div>
      {{ language_switch() }}
    </header>

    <main class="content">
      <section class="brand-panel" aria-label="mooon shop">
        <img class="brand-logo" src="/static/logo.jpg" alt="mooon shop">
      </section>

      <section class="display">
        <table id="displayTable" hidden>
          <thead>
            <tr>
              <th>{{ t('product_name') }}</th>
              <th class="price">{{ t('price') }}</th>
              <th class="qty">{{ t('qty') }}</th>
              <th class="subtotal">{{ t('subtotal') }}</th>
            </tr>
          </thead>
          <tbody id="displayBody"></tbody>
        </table>
        <div id="emptyState" class="empty"></div>
      </section>
    </main>

    <footer class="totalbar">
      <div>
        <div class="total-label">{{ t('total') }}</div>
      </div>
      <div class="total-value">¥<span id="displayTotal">0</span></div>
    </footer>
  </div>

  <div id="thankYouOverlay" class="thank-you" aria-live="polite">
    <div class="thank-card">
      <div class="checkmark" aria-hidden="true"></div>
      <img class="thank-logo" src="/static/logo.jpg" alt="mooon shop">
      <div class="thank-text">{{ t('thank_you') }}</div>
    </div>
  </div>

  <script>
    const labels = {
      paid: {{ t('paid')|tojson }}
    };
    let thankYouTimer = null;
    let lastStatus = null;

    function formatJpy(value) {
      return String(Math.round(Number(value) || 0));
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderDisplay(data) {
      const items = data.items || [];
      const table = document.getElementById('displayTable');
      const body = document.getElementById('displayBody');
      const empty = document.getElementById('emptyState');
      const status = document.getElementById('displayStatus');
      const total = document.getElementById('displayTotal');
      const overlay = document.getElementById('thankYouOverlay');

      body.innerHTML = '';
      table.hidden = items.length === 0;
      empty.hidden = items.length > 0;

      for (const item of items) {
        const row = document.createElement('tr');
        const imageSrc = item.image ? `/static/${escapeHtml(item.image)}` : '/static/logo.jpg';
        row.innerHTML = `
          <td>
            <div class="item-cell">
              <img class="item-image" src="${imageSrc}" alt="">
              <span class="item-name">${escapeHtml(item.name)}</span>
            </div>
          </td>
          <td class="price">¥${formatJpy(item.price)}</td>
          <td class="qty">${item.qty}</td>
          <td class="subtotal">¥${formatJpy(item.subtotal)}</td>
        `;
        body.appendChild(row);
      }

      total.textContent = formatJpy(data.total);
      status.textContent = data.status === 'paid' ? labels.paid : '';
      status.className = data.status === 'paid' ? 'status paid' : 'status';

      if (data.status === 'paid' && lastStatus !== 'paid') {
        overlay.classList.add('show');
        clearTimeout(thankYouTimer);
        thankYouTimer = setTimeout(() => {
          overlay.classList.remove('show');
          table.hidden = true;
          empty.hidden = false;
          body.innerHTML = '';
          total.textContent = '0';
          status.textContent = '';
        }, 4200);
      } else {
        overlay.classList.remove('show');
      }
      lastStatus = data.status;
    }

    async function refreshDisplay() {
      try {
        const response = await fetch('/api/customer-display', { cache: 'no-store' });
        if (!response.ok) return;
        renderDisplay(await response.json());
      } catch (error) {
        console.warn('customer display refresh failed', error);
      }
    }

    refreshDisplay();
    setInterval(refreshDisplay, 300);
  </script>
</body>
</html>
